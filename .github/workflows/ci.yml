name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest
      - name: Build package
        run: |
          python -m pip install build
          python -m build
      - name: CLI help smoke test
        run: git-shield --help
